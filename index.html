<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Theory Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Syne:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0f;
      --bg-panel:  #111114;
      --bg-card:   #18181c;
      --border:    #1e1e24;
      --gold:      #c8a96e;
      --gold-dim:  #7a6040;
      --blue-acc:  #4a6a8a;
      --text:      #cccccc;
      --text-dim:  #555555;
      --text-mute: #2e2e34;
      --green:     #2ecc71;
      --red:       #e74c3c;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; }

    /* ── Layout ─────────────────────────────────── */
    .app { display: flex; flex-direction: column; height: 100vh; max-width: 1100px; margin: 0 auto; }

    /* ── Titlebar ───────────────────────────────── */
    .titlebar {
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex; align-items: center; gap: 14px;
      flex-shrink: 0;
    }
    .tl-group { display: flex; gap: 7px; }
    .tl { width: 13px; height: 13px; border-radius: 50%; }
    .tl-r { background: #ff5f57; } .tl-y { background: #febc2e; } .tl-g { background: #28c840; }
    .app-name { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); letter-spacing: .1em; text-transform: uppercase; margin-left: 6px; }
    .status-group { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .status-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #333; transition: background .3s; }
    .status-dot.connected { background: var(--green); animation: pulse 2s infinite; }
    .status-dot.listening { background: var(--gold); animation: pulse 1s infinite; }
    .status-dot.speaking  { background: var(--blue-acc); animation: pulse 1.4s infinite; }

    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.3; } }

    /* ── Body ───────────────────────────────────── */
    .body { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ────────────────────────────────── */
    .sidebar {
      width: 190px; flex-shrink: 0;
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 12px 0;
    }
    .sidebar-section { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-mute); letter-spacing: .12em; text-transform: uppercase; padding: 10px 16px 4px; }
    .sidebar-item { display: flex; align-items: center; gap: 10px; padding: 8px 16px; font-size: 13px; color: var(--text-dim); cursor: pointer; border-left: 2px solid transparent; transition: all .15s; }
    .sidebar-item:hover { background: var(--bg-card); color: #aaa; }
    .sidebar-item.active { color: var(--gold); border-left-color: var(--gold); background: var(--bg-card); }
    .sidebar-item svg { width: 15px; height: 15px; flex-shrink: 0; }
    .sidebar-meta { margin-top: auto; padding: 12px 16px; font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #2a2a32; line-height: 2; }

    /* ── Content ────────────────────────────────── */
    .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* ── Chat ───────────────────────────────────── */
    .chat {
      flex: 1; overflow-y: auto; padding: 24px 28px;
      display: flex; flex-direction: column; gap: 20px;
      scrollbar-width: thin; scrollbar-color: #222 transparent;
    }
    .msg { display: flex; gap: 12px; max-width: 80%; }
    .msg.agent { align-self: flex-start; }
    .msg.user  { align-self: flex-end; flex-direction: row-reverse; }

    .avatar {
      width: 34px; height: 34px; border-radius: 7px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 15px;
    }
    .avatar.av-agent { background: #1e1a12; border: 1px solid #2a2318; color: var(--gold); }
    .avatar.av-user  { background: #161a2a; border: 1px solid #1e2438; color: var(--blue-acc); }

    .bubble { padding: 11px 15px; border-radius: 9px; line-height: 1.65; font-size: 14px; }
    .msg.agent .bubble { background: var(--bg-card); border: 1px solid var(--border); color: #ccc; border-top-left-radius: 2px; }
    .msg.user  .bubble { background: #161a2a; border: 1px solid #1e2438; color: #afc8e0; border-top-right-radius: 2px; }

    .bubble-tag { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--gold); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 6px; opacity: .7; }
    .user .bubble-tag { color: var(--blue-acc); }

    .typing { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
    .typing span { width: 6px; height: 6px; border-radius: 50%; background: #444; animation: blink 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: .2s; }
    .typing span:nth-child(3) { animation-delay: .4s; }
    @keyframes blink { 0%,100%{opacity:.3} 50%{opacity:1} }

    /* ── Bottom panel ───────────────────────────── */
    .bottom {
      background: var(--bg-panel);
      border-top: 1px solid var(--border);
      padding: 12px 20px 16px;
      flex-shrink: 0;
    }

    /* Visualizer */
    .viz { display: flex; gap: 3px; align-items: flex-end; height: 30px; margin-bottom: 12px; }
    .viz-bar { flex: 1; background: var(--text-mute); border-radius: 2px; height: 4px; transition: height .08s; }
    .viz-bar.active { background: var(--gold); }
    .viz-hint { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #2a2a30; text-align: center; width: 100%; align-self: center; }

    /* Controls */
    .controls { display: flex; align-items: center; gap: 10px; }

    .mic-btn {
      width: 46px; height: 46px; border-radius: 50%; flex-shrink: 0;
      border: 1.5px solid #2a2318; background: #1a1611; color: var(--gold);
      font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all .2s;
    }
    .mic-btn:hover { border-color: var(--gold); background: #221c12; }
    .mic-btn.live { background: var(--gold); color: #111; border-color: var(--gold); }

    .input-wrap { flex: 1; position: relative; }
    .text-input {
      width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 40px 10px 15px; color: var(--text); font-family: 'Syne', sans-serif; font-size: 13px;
      outline: none; transition: border-color .2s;
    }
    .text-input:focus { border-color: var(--gold-dim); }
    .text-input::placeholder { color: #333; }
    .send-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--gold); cursor: pointer; font-size: 18px; line-height: 1; padding: 0; }

    .voice-badge { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--gold-dim); white-space: nowrap; }

    /* Error banner */
    .error-banner { background: #1a0e0e; border: 1px solid #3a1a1a; color: #e08080; font-size: 13px; padding: 10px 16px; border-radius: 6px; margin-bottom: 8px; display: none; }
    .error-banner.show { display: block; }
  </style>
</head>
<body>
<div class="app">

  <!-- Titlebar -->
  <div class="titlebar">
    <div class="tl-group">
      <div class="tl tl-r"></div><div class="tl tl-y"></div><div class="tl tl-g"></div>
    </div>
    <span class="app-name">Music Theory Agent</span>
    <div class="status-group">
      <span class="status-label" id="statusLabel">idle</span>
      <div class="status-dot" id="statusDot"></div>
    </div>
  </div>

  <!-- Body -->
  <div class="body">

    <!-- Sidebar -->
    <aside class="sidebar" aria-label="Navigation">
      <div class="sidebar-section">Session</div>
      <div class="sidebar-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Conversation
      </div>
      <div class="sidebar-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        Progressions
      </div>
      <div class="sidebar-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Notes
      </div>
      <div class="sidebar-section" style="margin-top:8px">Voice</div>
      <div class="sidebar-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
        Audio
      </div>
      <div class="sidebar-meta">
        voice: james<br>
        region: us<br>
        model: claude
      </div>
    </aside>

    <!-- Main content -->
    <div class="content">
      <div class="chat" id="chat" role="log" aria-live="polite" aria-label="Conversation">

        <!-- Initial greeting -->
        <div class="msg agent">
          <div class="avatar av-agent">♩</div>
          <div class="bubble">
            <div class="bubble-tag">agent</div>
            Hey there! I'm your music theory assistant. Click the mic button and start talking — ask me about scales, chord progressions, melodies, anything.
          </div>
        </div>

      </div>

      <!-- Bottom panel -->
      <div class="bottom">
        <div class="error-banner" id="errorBanner"></div>
        <div class="viz" id="viz">
          <span class="viz-hint" id="vizHint">click the mic to start</span>
        </div>
        <div class="controls">
          <button class="mic-btn" id="micBtn" aria-label="Toggle microphone" onclick="toggleMic()">🎙</button>
          <div class="input-wrap">
            <input class="text-input" id="textInput" placeholder="Or type a question..." onkeydown="handleKey(event)" />
            <button class="send-btn" aria-label="Send message" onclick="sendText()">↑</button>
          </div>
          <span class="voice-badge">◈ james</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // ── Config ──────────────────────────────────────────────────────────────────
  // Replace with your actual Render backend URL after deploying.
  const BACKEND_URL = 'https://YOUR_RENDER_APP.onrender.com';

  const AGENT_WS    = 'wss://agents.assemblyai.com/v1/ws';
  const SAMPLE_RATE = 24000;

  const SESSION_CONFIG = {
    system_prompt: `You are an expert music theory tutor and creative collaborator.
You have deep knowledge of scales, intervals, chords, harmony, counterpoint, chord progressions
in any genre (jazz, classical, pop, blues, R&B, folk, metal), melody construction, song structure,
and music history. Keep answers conversational, warm, and concise — the user is talking to you.`,
    greeting: "Hey there! I'm your music theory assistant. Ask me anything — scales, chords, progressions, melodies — I'm here to help.",
    input: {
      format: { encoding: 'audio/pcm' },
      keyterms: ['chord progression','diatonic','modulation','pentatonic','arpeggio',
        'cadence','tritone','diminished','augmented','dominant','subdominant','tonic',
        'Dorian','Phrygian','Lydian','Mixolydian','Locrian','ii-V-I','circle of fifths'],
      turn_detection: { vad_threshold: 0.5, min_silence: 200, max_silence: 1000, interrupt_response: true },
    },
    output: { voice: 'james', format: { encoding: 'audio/pcm' } },
  };

  // ── State ────────────────────────────────────────────────────────────────────
  let ws            = null;
  let audioCtx      = null;
  let micStream     = null;
  let processorNode = null;
  let speakerQueue  = [];
  let speakerTime   = 0;
  let live          = false;
  let vizBars       = [];
  let vizAnim       = null;

  // ── Status ───────────────────────────────────────────────────────────────────
  function setStatus(state) {
    const dot   = document.getElementById('statusDot');
    const label = document.getElementById('statusLabel');
    dot.className = 'status-dot ' + state;
    label.textContent = state;
  }

  // ── Error banner ─────────────────────────────────────────────────────────────
  function showError(msg) {
    const b = document.getElementById('errorBanner');
    b.textContent = msg;
    b.classList.add('show');
    setTimeout(() => b.classList.remove('show'), 6000);
  }

  // ── Chat ─────────────────────────────────────────────────────────────────────
  function addMessage(role, text) {
    const chat = document.getElementById('chat');
    const msg  = document.createElement('div');
    msg.className = `msg ${role}`;
    const isAgent = role === 'agent';
    msg.innerHTML = `
      <div class="avatar av-${role}">${isAgent ? '♩' : '♪'}</div>
      <div class="bubble">
        <div class="bubble-tag">${isAgent ? 'agent' : 'you'}</div>
        ${escHtml(text)}
      </div>`;
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
  }

  function showTyping() {
    const chat = document.getElementById('chat');
    const el   = document.createElement('div');
    el.className = 'msg agent'; el.id = 'typingMsg';
    el.innerHTML = `<div class="avatar av-agent">♩</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
    chat.appendChild(el);
    chat.scrollTop = chat.scrollHeight;
  }
  function hideTyping() { document.getElementById('typingMsg')?.remove(); }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Visualizer ───────────────────────────────────────────────────────────────
  function buildViz() {
    const viz  = document.getElementById('viz');
    const hint = document.getElementById('vizHint');
    if (hint) hint.remove();
    viz.innerHTML = '';
    vizBars = [];
    for (let i = 0; i < 52; i++) {
      const b = document.createElement('div');
      b.className = 'viz-bar';
      viz.appendChild(b);
      vizBars.push(b);
    }
  }

  function animateViz(active) {
    if (vizAnim) cancelAnimationFrame(vizAnim);
    if (!active) { vizBars.forEach(b => { b.style.height='4px'; b.classList.remove('active'); }); return; }
    const step = () => {
      vizBars.forEach(b => {
        const h = Math.floor(Math.random() * 24 + 4);
        b.style.height = h + 'px';
        b.classList.toggle('active', h > 14);
      });
      vizAnim = setTimeout(step, 80);
    };
    step();
  }

  // ── Audio: mic capture ───────────────────────────────────────────────────────
  async function startMic() {
    audioCtx  = new AudioContext({ sampleRate: SAMPLE_RATE });
    micStream = await navigator.mediaDevices.getUserMedia({ audio: { channelCount: 1, sampleRate: SAMPLE_RATE }, video: false });

    const source = audioCtx.createMediaStreamSource(micStream);

    // ScriptProcessor (wide support; AudioWorklet would be preferable in prod)
    processorNode = audioCtx.createScriptProcessor(2048, 1, 1);
    processorNode.onaudioprocess = (e) => {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      const f32 = e.inputBuffer.getChannelData(0);
      const i16 = new Int16Array(f32.length);
      for (let i = 0; i < f32.length; i++) {
        i16[i] = Math.max(-32768, Math.min(32767, Math.round(f32[i] * 32767)));
      }
      const b64 = btoa(String.fromCharCode(...new Uint8Array(i16.buffer)));
      ws.send(JSON.stringify({ type: 'input.audio', audio: b64 }));
    };

    source.connect(processorNode);
    processorNode.connect(audioCtx.destination);
  }

  function stopMic() {
    processorNode?.disconnect();
    processorNode = null;
    micStream?.getTracks().forEach(t => t.stop());
    micStream = null;
    audioCtx?.close();
    audioCtx = null;
  }

  // ── Audio: speaker playback ──────────────────────────────────────────────────
  function playPcm(b64) {
    if (!audioCtx) return;
    const raw    = atob(b64);
    const bytes  = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
    const i16    = new Int16Array(bytes.buffer);
    const f32    = new Float32Array(i16.length);
    for (let i = 0; i < i16.length; i++) f32[i] = i16[i] / 32768;

    const buf    = audioCtx.createBuffer(1, f32.length, SAMPLE_RATE);
    buf.copyToChannel(f32, 0);
    const src    = audioCtx.createBufferSource();
    src.buffer   = buf;
    src.connect(audioCtx.destination);

    const now    = audioCtx.currentTime;
    const start  = Math.max(now, speakerTime);
    src.start(start);
    speakerTime  = start + buf.duration;
  }

  function flushSpeaker() {
    speakerTime = audioCtx ? audioCtx.currentTime : 0;
  }

  // ── WebSocket + session ──────────────────────────────────────────────────────
  async function connect() {
    // 1. Fetch a temp token from our backend
    let token;
    try {
      const res = await fetch(`${BACKEND_URL}/token`);
      if (!res.ok) throw new Error(`Token endpoint returned ${res.status}`);
      const data = await res.json();
      token = data.token;
    } catch (err) {
      showError(`Could not reach backend: ${err.message}. Is it deployed?`);
      return false;
    }

    // 2. Connect to Voice Agent WebSocket
    ws = new WebSocket(`${AGENT_WS}?token=${token}`);
    ws.binaryType = 'arraybuffer';

    ws.onopen = async () => {
      // Send session config immediately
      ws.send(JSON.stringify({ type: 'session.update', session: SESSION_CONFIG }));
      await startMic();
    };

    ws.onmessage = (e) => {
      const ev = JSON.parse(e.data);
      switch (ev.type) {
        case 'session.ready':
          setStatus('listening');
          speakerTime = 0;
          break;

        case 'input.speech.started':
          hideTyping();
          setStatus('listening');
          break;

        case 'transcript.user':
          if (ev.text) addMessage('user', ev.text);
          showTyping();
          break;

        case 'transcript.agent':
          hideTyping();
          if (ev.text) addMessage('agent', ev.text);
          setStatus('speaking');
          break;

        case 'reply.audio':
          // note: reply.audio uses "data" field, not "audio"
          playPcm(ev.data);
          break;

        case 'reply.done':
          setStatus('listening');
          if (ev.status === 'interrupted') flushSpeaker();
          break;

        case 'error':
          showError(ev.error || JSON.stringify(ev));
          break;
      }
    };

    ws.onerror = () => showError('WebSocket error — check your backend URL and API key.');
    ws.onclose = (e) => {
      setStatus('idle');
      animateViz(false);
      if (e.code === 1008) showError('Auth failed — check your API key on Render.');
    };

    return true;
  }

  function disconnect() {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'Terminate' }));
      ws.close();
    }
    ws = null;
    stopMic();
    flushSpeaker();
  }

  // ── Mic button ───────────────────────────────────────────────────────────────
  async function toggleMic() {
    const btn = document.getElementById('micBtn');
    if (!live) {
      live = true;
      btn.classList.add('live');
      btn.textContent = '⏹';
      btn.setAttribute('aria-label', 'Stop session');
      setStatus('connected');
      buildViz();
      animateViz(true);
      const ok = await connect();
      if (!ok) {
        live = false;
        btn.classList.remove('live');
        btn.textContent = '🎙';
        animateViz(false);
        setStatus('idle');
      }
    } else {
      live = false;
      btn.classList.remove('live');
      btn.textContent = '🎙';
      btn.setAttribute('aria-label', 'Start session');
      setStatus('idle');
      animateViz(false);
      disconnect();
    }
  }

  // ── Text input ───────────────────────────────────────────────────────────────
  function handleKey(e) { if (e.key === 'Enter') sendText(); }
  function sendText() {
    const inp  = document.getElementById('textInput');
    const text = inp.value.trim();
    if (!text) return;
    inp.value = '';
    addMessage('user', text);
    // Text-only mode: show a nudge to use voice for now
    addMessage('agent', 'I hear you! For the best experience, use the mic button to speak with me directly.');
  }
</script>
</body>
</html>
